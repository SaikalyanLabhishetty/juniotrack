name: Process attendance notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  process-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger notification processor
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "APP_BASE_URL GitHub secret is missing."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is missing."
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "$APP_BASE_URL/api/internal/notifications/process" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"